<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    width:400px;
    padding:25px;
    border-radius:15px;
}
</style>

</head>
<body>

<div class="card shadow">
<h3 class="text-center mb-3">Signup</h3>
<div id="messageBox"></div>  
<form id="signupForm">
<input type="text" id="name" class="form-control mb-2" placeholder="Name" required>
<input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
<div class="input-group mb-2">
    <input type="password" id="password" class="form-control" placeholder="Password" required>
    <span class="input-group-text" style="cursor:pointer;" onclick="togglePassword('password', this)">
        👁
    </span>
</div>


<select id="role" class="form-control mb-3">
<option value="user">User</option>
<option value="admin">Admin</option>
</select>

<button class="btn btn-warning w-100" type="submit">Signup</button>
</form>

<p class="text-center mt-3">
Already have account? <a href="login.html">Login</a>
</p>

</div>

<script src="js/auth.js"></script>
<script>
function togglePassword(inputId, iconElement) {

    const input = document.getElementById(inputId);

    if (input.type === "password") {
        input.type = "text";
        iconElement.textContent = "🙈";
    } else {
        input.type = "password";
        iconElement.textContent = "👁";
    }
}
</script>

</body>

</html>
