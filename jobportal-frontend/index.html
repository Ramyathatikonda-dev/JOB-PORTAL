<script>
const toggleBtn = document.getElementById("themeToggle");

// Load saved theme
if(localStorage.getItem("theme") === "dark"){
    document.body.classList.add("dark-mode");
    toggleBtn.innerHTML = "☀️";
}

toggleBtn.addEventListener("click", function(){
    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){
        localStorage.setItem("theme", "dark");
        toggleBtn.innerHTML = "☀️";
    } else {
        localStorage.setItem("theme", "light");
        toggleBtn.innerHTML = "🌙";
    }
});

function debounce(func, delay) {
    let timeout;
    return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), delay);
    };
}

function highlight(text, keyword) {
    const regex = new RegExp(`(${keyword})`, "gi");
    return text.replace(regex, `<span class="text-warning fw-bold">$1</span>`);
}



const searchInput = document.getElementById("searchInput");
const resultsContainer = document.getElementById("searchResults");

let allJobs = [];

// Load jobs once
fetch("http://127.0.0.1:8000/api/jobs/")
    .then(res => res.json())
    .then(data => {
        allJobs = data;
    })
    .catch(err => console.error("Failed to load jobs:", err));

// Live search while typing
searchInput.addEventListener("input", debounce(function () {

    const keyword = this.value.trim().toLowerCase();

    if (!keyword) {
        resultsContainer.innerHTML = "";
        return;
    }

    saveRecentSearch(keyword);

    const filtered = allJobs.filter(job =>
        job.title.toLowerCase().includes(keyword) ||
        job.company.toLowerCase().includes(keyword) ||
        job.location.toLowerCase().includes(keyword)
    );

    renderSearchResults(filtered, keyword);

}, 300));

function viewJob(id) {
    window.location.href = `jobs.html?id=${id}`;
}



function renderSearchResults(jobs, keyword) {

    resultsContainer.innerHTML = "";

    if (jobs.length === 0) {
        resultsContainer.innerHTML =
            `<div class="col-12"><p class="text-muted">No jobs found</p></div>`;
        return;
    }

    jobs.forEach(job => {
        resultsContainer.innerHTML += `
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5>${highlight(job.title, keyword)}</h5>
                        <p class="mb-1"><strong>${highlight(job.company, keyword)}</strong></p>
                        <p class="text-muted">${highlight(job.location, keyword)}</p>
                        <button 
    class="btn btn-outline-primary w-100"
    onclick="viewJob(${job.id})">
    View Details
</button>

                    </div>
                </div>
            </div>
        `;
    });
}

function saveRecentSearch(keyword) {
    let searches = JSON.parse(localStorage.getItem("recentSearches")) || [];

    if (!searches.includes(keyword)) {
        searches.unshift(keyword);
        searches = searches.slice(0, 5);
        localStorage.setItem("recentSearches", JSON.stringify(searches));
    }
}


</script>
