<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    width:400px;
    padding:25px;
    border-radius:15px;
}
</style>

</head>
<body>

<div class="card shadow">
<h3 class="text-center mb-3">Login</h3>

<form id="loginForm">
<input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email" required>
<div class="input-group mb-3">
    <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
    <span class="input-group-text" style="cursor:pointer;" onclick="togglePassword('loginPassword', this)">
        👁
    </span>
</div>

<button class="btn btn-warning w-100">Login</button>
</form>

<p class="text-center mt-3">
Create account? <a href="signup.html">Signup</a>
</p>

</div>

<script src="js/auth.js"></script>
<script>
function togglePassword(inputId, iconElement) {

    const input = document.getElementById(inputId);

    if (input.type === "password") {
        input.type = "text";
        iconElement.textContent = "🙈";
    } else {
        input.type = "password";
        iconElement.textContent = "👁";
    }
}
</script>

</body>
</html>
