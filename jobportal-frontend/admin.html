<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | TalentOrbit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}
.card {
    border-radius: 12px;
}
h2 {
    font-weight: 600;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">TalentOrbit Admin</a>
<button onclick="logout()" class="btn btn-danger">Logout</button>
</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4">Admin Dashboard</h2>

<!-- ================= STATS ================= -->
<div class="row mb-4">
<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5>Total Jobs</h5>
<h3 id="totalJobs">0</h3>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5>Total Users</h5>
<h3 id="totalUsers">0</h3>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card text-center shadow">
<div class="card-body">
<h5>Total Applications</h5>
<h3 id="totalApplications">0</h3>
</div>
</div>
</div>
</div>

<!-- ================= USER MANAGEMENT ================= -->
<div class="card shadow mb-4">
<div class="card-body">
<h4>Users</h4>

<table class="table table-bordered mt-3">
<thead class="table-dark">
<tr>
<th>#</th>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

</div>
</div>

<div class="card shadow mt-4">
<div class="card-body">
<h4>Contact Messages</h4>
<table class="table table-bordered mt-3">
<thead class="table-dark">
<tr>
<th>#</th>
<th>Name</th>
<th>Email</th>
<th>Message</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="contactTable"></tbody>
</table>
</div>
</div>



<!-- ================= ADD JOB ================= -->
<div class="card shadow mb-4">
<div class="card-body">
<h4>Add New Job</h4>

<form id="jobForm">

<input type="text" id="title" class="form-control mb-2"
placeholder="Job Title" required>

<input type="text" id="company" class="form-control mb-2"
placeholder="Company Name" required>

<input type="text" id="location" class="form-control mb-2"
placeholder="Location" required>

<input type="text" id="salary" class="form-control mb-2"
placeholder="Salary (e.g. ₹6 LPA)" required>

<select id="job_type" class="form-control mb-2" required>
<option value="">Select Job Type</option>
<option value="Full-Time">Full-Time</option>
<option value="Part-Time">Part-Time</option>
<option value="Internship">Internship</option>
<option value="Remote">Remote</option>
</select>

<textarea id="description" class="form-control mb-3"
placeholder="Job Description" rows="3" required></textarea>

<button class="btn btn-warning w-100">Add Job</button>

</form>

</div>
</div>


<!-- ================= JOB LIST ================= -->
<div class="card shadow">
<div class="card-body">
<h4>Job List</h4>

<table class="table table-bordered mt-3">
<thead class="table-dark">
<tr>
<th>#</th>
<th>Title</th>
<th>Company</th>
<th>Location</th>
<th>Salary</th>
<th>Type</th>
<th>Action</th>
</tr>
</thead>
<tbody id="jobTable"></tbody>
</table>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>

<script>
function logout(){
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}
</script>

</body>
</html>
